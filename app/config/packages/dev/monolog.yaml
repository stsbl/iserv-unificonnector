monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel

    handlers:
        main:
            type: rotating_file
            path: "%kernel.logs_dir%/%kernel.environment%.log"
            level: debug
            max_files: 1 # Throw away logs older than 1 day.
            channels:
                - "!event"
                - "!deprecation"
        # uncomment to get logging in your browser
        # you may have to allow bigger header sizes in your Web server configuration
        #firephp:
        #    type: firephp
        #    level: info
        #chromephp:
        #    type: chromephp
        #    level: info
        deprecation:
            type: rotating_file
            path: "%kernel.logs_dir%/%kernel.environment%.deprecations.log"
            max_files: 1 # Throw away logs older than 1 day.
            channels:
                - deprecation
        console:
            type: console
            process_psr_3_messages: false
            channels:
                - "!event"
                - "!doctrine"
                - "!console"
                - "!deprecation"
