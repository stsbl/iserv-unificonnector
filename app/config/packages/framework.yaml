# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(file:APP_SECRET_FILE)%'
    csrf_protection: true
    http_method_override: false
    handle_all_throwables: true
    error_controller: 'IServ\Bundle\Error\Exception\ErrorController'

    # Enables session support. Note that the session will ONLY be started if you read or write from it.
    # Remove or comment this section to explicitly disable session support.
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native
        gc_probability: 0

    assets:
        json_manifest_path: '%kernel.project_dir%/public/static/manifest.json'
        packages:
            iserv-js:
                base_path: '/iserv'

    php_errors:
        log: "%kernel.debug%" # Write PHP errors incl. deprecations into the app log only on DEV.
        throw: true # Always throw PHP errors as \ErrorException instances.

when@dev:
    framework:
        secret: 'unificonnector-development-secret' # We don't have a secret file in DEV. Therefore, we just use a simple secret.
